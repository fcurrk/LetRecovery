name: ✨ 功能建议 (Feature Request)
description: 提出新功能或改进建议
title: "[Feature] 一句话描述建议"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！请描述清楚**要解决什么问题**，而不只是**怎么实现**。

  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 issue / Discussions，确认没有重复
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 / 场景
      description: 你在什么情况下遇到了不便？现状是怎样的？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的功能 / 方案
      description: 你希望它怎么工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 现有变通做法
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 其他补充（参考截图、同类软件做法等）
    validations:
      required: false
