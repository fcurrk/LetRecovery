name: Build LetRecovery Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: fcurrk/toolchain@master
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: build Desktop
        env:
          SERVER_BASE_URL: ${{ secrets.SERVER_BASE_URL }}
        working-directory: desktop
        run: |
          cargo build --release
          copy Cargo.lock desktop\Cargo.lock

      - name: build pe
        env:
          SERVER_BASE_URL: ${{ secrets.SERVER_BASE_URL }}
        working-directory: pe
        run: |
          cargo build --release
          copy Cargo.lock pe\Cargo.lock

      - name: Commit Cargo.lock
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add desktop/Cargo.lock pe/Cargo.lock
          git diff --quiet && git diff --staged --quiet || git commit -m "Update pe/Cargo.lock" || echo "No changes to pe/Cargo.lock"
          git push || echo "Nothing to push pe/Cargo.lock"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LetRecovery
          path: target/release/*.exe
          retention-days: 30