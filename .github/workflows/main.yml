name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v6
      
    - name: Install rust-toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc
        
    - name: Build Desktop
      run: |
        cd "正常系统端"
        cargo build --release
        
    - name: Build PE
      run: |
        cd "PE端"
        cargo build --release
        
    - name: Compress Desktop
      run: |
        mkdir -p 正常系统端-release
        copy "正常系统端\target\release\*.exe" 正常系统端-release\
        Compress-Archive -Path 正常系统端-release -DestinationPath 正常系统端.zip
        
    - name: Compress PE
      run: |
        mkdir -p PE端-release
        copy "PE端\target\release\*.exe" PE端-release\
        Compress-Archive -Path PE端-release -DestinationPath PE端.zip
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: letrecovery-windows-builds
        path: |
          正常系统端.zip
          PE端.zip
        retention-days: 30